<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./js/script.js" defer></script>
    <link rel="stylesheet" href="./css/style.css">
    <title>Document</title>
</head>
<body>
    <form id="formAtividade">
<input type="hidden" id="id">
<label for="titulo">Título da atividade</label>
<input type="text" id="titulo" placeholder="Digite o título da atividade">
<label for="descricao">Descrição</label>
<textarea id="descricao" placeholder="Descreva a atividade"></textarea>
<label for="data">Data</label>
<input type="date" id="data">
<label for="horario">Horário</label>
<input type="time" id="horario">
<label for="prioridade">Prioridade</label>
<select id="prioridade">

<option value="">Selecione</option>
<option value="Baixa">Baixa</option>
<option value="Média">Média</option>
<option value="Alta">Alta</option>
</select>
<label for="status">Status</label>
<select id="status">
<option value="">Selecione</option>


<option value="Pendente">Pendente</option>
<option value="Em andamento">Em andamento</option>
<option value="Concluída">Concluída</option>
</select>
<button class="btn-salvar" type="submit">Salvar</button>
<button type="button" id="btnLimpar">Limpar</button>
</form>
<section>
<h2>Atividades cadastradas</h2>
<div id="listaAtividades"></div>
</section>
</body>
</html>
